sentence=Arduino library for reading a TWK KBE 58 - K 4096 G K E06 absolute encoder using SSI and an RS422 transceiver.
paragraph=Reads SSI raw value, Gray value, position, trailing bits, DATA idle level and calculates the angle. Supports BitBang, portable Arduino SPI and ESP32 precise SPI with optional background read. Suitable for KBE 58 - K 4096 G K E06 Gray SSI with 12 useful bits and 13 clocks.
