sentence=Arduino library for reading a TWK KBE 58 - K 4096 G K E06 absolute encoder using SSI and an RS422 transceiver.
paragraph=Reads SSI raw value, Gray value, position, trailing bits, DATA idle level and calculates the angle. Suitable for KBE 58 - K 4096 G K E06 Gray SSI with 12 useful bits and 13 clocks. Designed for Arduino-compatible boards with suitable GPIO timing and an external full duplex RS422 transceiver.
