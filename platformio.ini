; Local development and CI build for the TWK_KBE58_SSI Arduino library.
; Builds the RD130_ADM3490_Diagnose example against the library in this repo.

[platformio]
src_dir = examples/RD130_ADM3490_Diagnose
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    file://${PROJECT_DIR}

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    file://${PROJECT_DIR}
